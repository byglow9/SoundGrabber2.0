# Railway deployment configuration — SEC-INFRA-02, SEC-INFRA-03, SEC-INFRA-04 (Phase 7).
#
# Uvicorn binds to 0.0.0.0:$PORT — Railway injects $PORT per deploy and isolates the
# container from direct internet access via its edge proxy (D-11). HTTPS termination
# and HTTP->HTTPS 301 redirect happen at the Railway edge automatically (D-04, D-05).
#
# start-all.sh starts both Uvicorn (foreground, PID 1) and Celery Worker (background).
# This single-service approach replaces the previous two-service setup that had isolated
# /tmp directories (bug documented in 09-01-SMOKE-TEST.md Task 4).
#
# Schema reference: https://docs.railway.com/config-as-code/reference

[deploy]
startCommand = "bash start-all.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
