<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000"/>
  <g fill="#ff8800">
    <!-- cone: ponta estreita no topo, alarga até o crossbar -->
    <polygon points="47,2 53,2 82,26 18,26"/>
    <!-- left arm -->
    <rect x="18" y="26" width="12" height="44" rx="1"/>
    <!-- center arm (shorter) -->
    <rect x="44" y="26" width="12" height="30" rx="1"/>
    <!-- right arm -->
    <rect x="70" y="26" width="12" height="44" rx="1"/>
    <!-- left claw: curves inward (right) -->
    <path d="M18,68 C14,82 16,98 30,98 C42,98 46,86 30,68 Z"/>
    <!-- center claw: straight down -->
    <path d="M44,54 C44,66 44,74 50,78 C56,74 56,66 56,54 Z"/>
    <!-- right claw: curves inward (left) -->
    <path d="M82,68 C86,82 84,98 70,98 C58,98 54,86 70,68 Z"/>
  </g>
</svg>
